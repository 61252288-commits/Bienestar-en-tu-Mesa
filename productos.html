<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos - Bienestar en Tu Mesa</title>
  <link rel="stylesheet" href="estilos.css">
</head>
<body>
  <header>
    <nav>
      <a href="index.html">Inicio</a>
      <a href="productos.html">Productos</a>
      <a href="nosotros.html">Nosotros</a>
      <a href="contacto.html">Contacto</a>
    </nav>
  </header>

  <section id="app">
    <h2>Nuestros Productos</h2>
    <div class="grid">
      <div v-for="producto in productos" class="card">
        <img :src="producto.imagen" :alt="producto.nombre">
        <h3>{{ producto.nombre }}</h3>
        <p>{{ producto.descripcion }}</p>
        <button @click="comprar(producto)">Comprar</button>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
  <script>
    new Vue({
      el: '#app',
      data: {
        productos: [
          { nombre: 'Frutas', descripcion: 'Manzanas, plátanos y más', imagen: 'frutas.jpg' },
          { nombre: 'Verduras', descripcion: 'Tomates, lechugas y más', imagen: 'verduras.jpg' },
          { nombre: 'Snacks', descripcion: 'Barras y frutos secos', imagen: 'snacks.jpg' }
        ]
      },
      methods: {
        comprar(producto) {
          alert(`Has agregado ${producto.nombre} al carrito`);
        }
      }
    });
  </script>
</body>
</html>
